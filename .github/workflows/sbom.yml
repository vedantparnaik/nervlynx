name: sbom

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  cyclonedx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and SBOM tool
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM (environment)
        run: |
          cyclonedx-py environment --pyproject pyproject.toml --output-file sbom.cdx.json --output-format JSON

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom-${{ github.run_id }}
          path: sbom.cdx.json
